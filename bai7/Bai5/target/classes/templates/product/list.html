<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{_layout :: head(~{::title})}">
    <title>Danh sách sản phẩm</title>
</head>

<body>
    <div th:replace="~{_layout :: navbar(${cartCount})}"></div>

    <div class="container body-content mt-4">
        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0">Danh sách sản phẩm</h2>
            <a th:href="@{/products/add}" class="btn btn-primary">Thêm sản phẩm</a>
        </div>

        <form th:action="@{/products}" method="get" class="row g-3 mb-4 p-3 border rounded bg-light">
            <div class="col-md-4">
                <label class="form-label fw-bold">Từ khóa</label>
                <input type="text" class="form-control" name="keyword" th:value="${keyword}" placeholder="Nhập tên sản phẩm...">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Danh mục</label>
                <select class="form-select" name="categoryId">
                    <option value="">Tất cả danh mục</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${categoryId != null && categoryId == cat.id}"></option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">Sắp xếp</label>
                <select class="form-select" name="sort">
                    <option value="default" th:selected="${sort == 'default'}">Mặc định</option>
                    <option value="priceAsc" th:selected="${sort == 'priceAsc'}">Giá tăng dần</option>
                    <option value="priceDesc" th:selected="${sort == 'priceDesc'}">Giá giảm dần</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold">&nbsp;</label>
                <div class="d-grid">
                    <button type="submit" class="btn btn-success">Tìm kiếm</button>
                </div>
            </div>
        </form>

        <div class="table-responsive">
            <table class="table table-striped table-bordered align-middle">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Tên</th>
                        <th scope="col">Hình ảnh</th>
                        <th scope="col">Giá</th>
                        <th scope="col">Danh mục</th>
                        <th scope="col" style="width: 180px;">Giỏ hàng</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="6" class="text-center text-muted">Không có sản phẩm phù hợp.</td>
                    </tr>
                    <tr th:each="product : ${products}">
                        <th scope="row" th:text="${product.id}"></th>
                        <td th:text="${product.name}"></td>
                        <td>
                            <img height="120" width="150" th:src="${product.image}" alt="Product Image" class="object-fit-cover rounded border">
                        </td>
                        <td th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                        <td th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}"></td>
                        <td>
                            <form th:action="@{'/cart/add/' + ${product.id}}" method="post" class="d-flex gap-2">
                                <input type="number" min="1" name="quantity" value="1" class="form-control">
                                <button type="submit" class="btn btn-warning btn-sm">Thêm</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3" th:if="${productPage.totalPages > 0}">
            <div>
                Trang <strong th:text="${currentPage + 1}"></strong> / <strong th:text="${productPage.totalPages}"></strong>
            </div>
            <div class="btn-group">
                <a class="btn btn-outline-primary"
                   th:classappend="${!productPage.hasPrevious()} ? ' disabled' : ''"
                   th:href="@{/products(page=${currentPage - 1}, size=${size}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}">Previous</a>
                <a class="btn btn-outline-primary"
                   th:classappend="${!productPage.hasNext()} ? ' disabled' : ''"
                   th:href="@{/products(page=${currentPage + 1}, size=${size}, keyword=${keyword}, categoryId=${categoryId}, sort=${sort})}">Next</a>
            </div>
        </div>
    </div>

    <div th:replace="~{_layout :: footer}"></div>
</body>
</html>
