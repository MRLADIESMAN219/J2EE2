<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:replace="${title}">Bài 5_QLSP JPA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

<nav th:fragment="navbar(cartCount)" class="navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/products}">QL Sản phẩm</a>
        <div class="navbar-nav ms-auto d-flex flex-row gap-3">
            <a class="nav-link text-white" th:href="@{/products}">Sản phẩm</a>
            <a class="nav-link text-white" th:href="@{/products/add}">Thêm mới</a>
            <a class="nav-link text-white" th:href="@{/cart}">Giỏ hàng
                <span class="badge text-bg-warning" th:text="${cartCount != null ? cartCount : 0}">0</span>
            </a>
        </div>
    </div>
</nav>

<div th:fragment="footer" class="card-footer text-center mt-5">
    <hr/>
    <p>&copy; 2026 - Phát triển ứng dụng với J2EE</p>
</div>

</body>
</html>
