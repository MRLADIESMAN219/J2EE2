<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{_layout :: head(~{::title})}">
    <title>Danh sách sản phẩm</title>
</head>

<body>
    <div th:replace="~{_layout :: navbar}"></div>

    <div class="container body-content mt-4">
        <a th:href="@{/products/add}" class="btn btn-primary mb-3">Create New Product</a>
        
        <table class="table table-striped table-bordered">
            <thead class="table-dark">
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Name</th>
                    <th scope="col">Image</th>
                    <th scope="col">Price</th>
                    <th scope="col">Category Name</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <th scope="row" th:text="${product.id}"></th>
                    <td th:text="${product.name}"></td>
                    <td>
                        <img height="120" width="150" th:src="${product.image}" alt="Product Image">
                    </td>
                    <td th:text="${product.price}"></td>
                    <td th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{_layout :: footer}"></div>

</body>
</html>
